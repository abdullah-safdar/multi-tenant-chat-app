apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: microservices
  labels:
    app: chat-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: microservices/chat-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: chat-service-config
            - secretRef:
                name: chat-service-secret
          resources:
            requests:
              cpu: '150m'
              memory: '256Mi'
            limits:
              cpu: '750m'
              memory: '768Mi'
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
